    <main>
        <section class="herro-section contact-herro" style="background-image: url('./img/herro/contact.png');">
            <div class="container">
                <div class="row">
                    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                        <article class="herro-content p-3 ps-lg-0 animation" data-animation="slide-right">
                            <h1 class="herro-title mb-4">
                                Contact Us
                            </h1>
                            <div class="herro-info-data animation" data-animation="slide-top">
                                <p>
                                    <span class="info-icon fa-solid fa-location-dot"></span>
                                    146 Douglas Dale Suite 343
                                </p>
                                <p>
                                    <span class="info-icon fa-solid fa-phone"></span>
                                    <a href="tel:560-748-5959">560-748-5959</a>
                                </p>
                                <p>
                                    <span class="info-icon fa-regular fa-envelope"></span>
                                    <a href="mailto:cullen_mueller@yahoo.com">cullen_mueller@yahoo.com</a>
                                </p>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </section>
        <section class="contact-form-section">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-6">
                        <article class="contact-form-data">
                            <h2 class="contact-form-section-title text-center">
                                Please contact us using the form bellow
                            </h2>
                            <form method="get" action="" class="contact-form">
                                <div class="form-group">
                                    <input type="text" name="contact_name" value="" class="form-control"
                                        placeholder="Name and Surname*">
                                    <div class="invalid-feedback"></div>
                                </div>
                                <div class="form-group">
                                    <input type="email" name="contact_email" value="" class="form-control"
                                        placeholder="Email address*">
                                    <div class="invalid-feedback"></div>
                                </div>
                                <div class="form-group">
                                    <textarea name="contact_message" class="form-control" rows="5"
                                        placeholder="Enter your message*"></textarea>
                                    <div class="invalid-feedback"></div>
                                </div>
                                <div class="form-group text-center">
                                    <button type="submit" name="send" value="yes"
                                        class="btn btn-primary px-5 py-3 text-uppercase fw-medium rounded-pill">
                                        send message
                                    </button>
                                </div>
                            </form>
                        </article>
                    </div>

                </div>
            </div>
        </section>
        <section class="contact-map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d9393.3985420588!2d22.274351928375562!3d43.90750391003304!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ssr!2srs!4v1774206729558!5m2!1ssr!2srs"

        </section>
